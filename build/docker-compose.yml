# VLC.js WebAssembly Build — Docker Compose
#
# One-command build:
#   docker compose up
#
# NOTE: The current project root uses the v1.0-working binary which includes
# the webcodec module (required for 4K playback via browser WebCodecs API).
# The VLC 4.0 build does NOT include webcodec — do not run `docker compose up`
# unless you intend to replace the binary with the VLC 4.0 version.
#
# To rebuild from scratch (e.g., after changing Emscripten or VLC version):
#   docker compose build --no-cache
#   docker compose up

services:
  vlcjs-builder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ---- Version pins ----
        # Emscripten 4.0.1 — matches VLC's official CI (Feb 2025)
        EMSDK_VERSION: "4.0.1"
        # VLC master HEAD — has built-in WASM support, no external patches needed
        # 65e744b0 = 2026-01-29 (latest wasm-emscripten build.sh change)
        # Previous: 06e361b1 (2022, required 20+ patches)
        VLC_TESTED_HASH: "65e744b0"
    volumes:
      - ../:/host-output
    command: >
      sh -c "
        mkdir -p /host-output/vlc/modules/audio_output/webaudio &&
        cp /output/experimental.js /host-output/ &&
        cp /output/experimental.wasm /host-output/ &&
        cp /output/experimental.worker.js /host-output/ &&
        cp /output/audio-worklet-processor.js /host-output/vlc/modules/audio_output/webaudio/ 2>/dev/null;
        echo 'Build artifacts copied to project root:' &&
        ls -lh /host-output/experimental.*
      "
